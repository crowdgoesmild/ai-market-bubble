name: Daily AI Bubble Monitor

on:
  schedule:
    # GitHub cron is UTC. Adjust manually if you want local London time across DST.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run monitor
        env:
          TIINGO_API_TOKEN: ${{ secrets.TIINGO_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python -m src.run_daily

      - name: Commit updated dashboard and data
        run: |
          git config user.name "ai-bubble-monitor"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "Update AI bubble signals"
          git push
